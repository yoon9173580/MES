name: SPY 0DTE Signal Machine

# DISABLED 2026-06-02: legacy SPY 0DTE signal script (find_trigger.py),
# superseded by the v10 MES bot (.github/workflows/v10_bot.yml). The
# scheduled trigger was removed because every run was failing and only
# generated noise. Kept as manual-dispatch-only for archival/debug.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install pandas pytz requests yfinance pandas_market_calendars
      - name: Run Signal Engine
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python find_trigger.py
      - name: Push Results
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data.json 
          git commit -m "Signal Update: $(date)" || echo "No changes"
          git push
